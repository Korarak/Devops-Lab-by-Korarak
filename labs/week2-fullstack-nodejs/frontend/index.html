<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      height: fit-content;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input {
      flex: 1; padding: 0.6rem 1rem;
      border: 1px solid #ccc; border-radius: 8px; font-size: 1rem;
    }
    .add-form input:focus { outline: none; border-color: #2E75B6; }
    .add-form button {
      padding: 0.6rem 1.2rem; background: #2E75B6; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
    }
    .add-form button:hover { background: #1a5a99; }
    .todo-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem; border-bottom: 1px solid #eee;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .todo-title { flex: 1; font-size: 1rem; }
    .todo-title.done { text-decoration: line-through; color: #999; }
    .delete-btn {
      background: #e53e3e; color: white; border: none;
      border-radius: 6px; padding: 0.3rem 0.7rem;
      cursor: pointer; font-size: 0.85rem;
    }
    .delete-btn:hover { background: #c0392b; }
    .empty { color: #999; font-size: 0.9rem; padding: 1rem 0; }
    .status { font-size: 0.8rem; color: #999; margin-top: 1rem; text-align: right; }
    .error-msg { color: #e53e3e; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 DevOps Todo List</h1>
    <div class="add-form">
      <input type="text" id="new-todo" placeholder="พิมพ์งานใหม่แล้วกด Enter หรือคลิก เพิ่ม" />
      <button onclick="addTodo()">เพิ่ม</button>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <div id="todo-list">กำลังโหลด...</div>
    <p class="status" id="status"></p>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        renderTodos(data);
        document.getElementById('status').textContent =
          `โหลดล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
      } catch (err) {
        document.getElementById('todo-list').innerHTML =
          '<p style="color:#e53e3e;">❌ เชื่อมต่อ Backend ไม่ได้ — ตรวจสอบว่า npm run dev รันอยู่</p>';
      }
    }

    function renderTodos(todos) {
      const list = document.getElementById('todo-list');
      if (todos.length === 0) {
        list.innerHTML = '<p class="empty">ยังไม่มีงาน — เพิ่มงานแรกได้เลย!</p>';
        return;
      }
      list.innerHTML = todos.map(t => `
        <div class="todo-item">
          <input type="checkbox" ${t.completed ? 'checked' : ''}
            onchange="toggleTodo(${t.id})" />
          <span class="todo-title ${t.completed ? 'done' : ''}">${escapeHtml(t.title)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">ลบ</button>
        </div>`).join('');
    }

    async function addTodo() {
      const input = document.getElementById('new-todo');
      const errEl = document.getElementById('error-msg');
      const title = input.value.trim();
      if (!title) {
        errEl.textContent = 'กรุณาพิมพ์ชื่องานก่อน';
        return;
      }
      errEl.textContent = '';
      try {
        const res = await fetch(`${API}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        if (!res.ok) throw new Error('Failed');
        input.value = '';
        fetchTodos();
      } catch (err) {
        errEl.textContent = 'เพิ่มงานไม่สำเร็จ กรุณาลองใหม่';
      }
    }

    async function toggleTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'PATCH' });
      fetchTodos();
    }

    async function deleteTodo(id) {
      if (!confirm('ลบงานนี้?')) return;
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      fetchTodos();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('new-todo')
      .addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    fetchTodos();
  </script>
</body>
</html>
