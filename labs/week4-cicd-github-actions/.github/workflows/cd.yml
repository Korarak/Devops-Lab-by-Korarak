name: CD — Deploy StockPro

# ทริกเกอร์เมื่อ push ไปยัง main หรือสร้าง tag v*
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build Docker images แล้ว push ไปยัง Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # กำหนด tag ของ image: ถ้าเป็น git tag ใช้ tag นั้น, ไม่งั้นใช้ "latest"
      - name: Determine image version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # Login เข้า Docker Hub (ไม่ต้องระบุ registry = Docker Hub อัตโนมัติ)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build และ push Backend image (2 tags: version + latest)
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stockpro-backend:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/stockpro-backend:latest

      # Build และ push Frontend image
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stockpro-frontend:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/stockpro-frontend:latest

  # ─────────────────────────────────────────────────────────────
