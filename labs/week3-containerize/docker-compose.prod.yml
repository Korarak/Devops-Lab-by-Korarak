services:

  # ── Database ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       stockpro
      POSTGRES_USER:     dev
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d stockpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend — Pull จาก Docker Hub ────────────────────────────
  backend:
    # เปลี่ยน YOUR_USERNAME เป็น Docker Hub username ของตัวเอง
    image: YOUR_USERNAME/stockpro-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://dev:secret@db:5432/stockpro
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend — Pull จาก Docker Hub ───────────────────────────
  frontend:
    # เปลี่ยน YOUR_USERNAME เป็น Docker Hub username ของตัวเอง
    image: YOUR_USERNAME/stockpro-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
